// ── Google Drive API ──
class DriveAPI {
  constructor(token) { this.token = token; }
  headers() { return { "Authorization": `Bearer ${this.token}`, "Content-Type": "application/json" }; }

  async findFile(name) {
    const q = encodeURIComponent(`name='${name}' and trashed=false`);
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, { headers: this.headers() });
    const d = await r.json();
    return d.files?.[0]?.id || null;
  }

  async readFile(fileId) {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: this.headers() });
    return r.json();
  }

  async writeFile(fileId, data) {
    const body = JSON.stringify(data, null, 2);
    if (fileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method: "PATCH", headers: { "Authorization": `Bearer ${this.token}`, "Content-Type": "application/json" }, body
      });
    } else {
      const meta = await fetch("https://www.googleapis.com/drive/v3/files", {
        method: "POST", headers: this.headers(), body: JSON.stringify({ name: DRIVE_FILENAME, mimeType: "application/json" })
      });
      const { id } = await meta.json();
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
        method: "PATCH", headers: { "Authorization": `Bearer ${this.token}`, "Content-Type": "application/json" }, body
      });
      return id;
    }
    return fileId;
  }
}

async function fetchFLRPrice() {
  try {
    const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=flare-networks&vs_currencies=usd");
    const d = await r.json();
    return d?.["flare-networks"]?.usd || null;
  } catch { return null; }
}

// ── Main App ──
function App() {
  const [authToken, setAuthToken] = useState(null);
  const [clientId, setClientId] = useState(GOOGLE_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID_HERE" ? GOOGLE_CLIENT_ID : localStorage.getItem("flr_gclient") || "");
  const [clientIdInput, setClientIdInput] = useState("");
  const [showSetup, setShowSetup] = useState(false);

  const [levels, setLevels] = useState(() => INITIAL_SELLS.map(l => ({...l, trades:[]})));
  const [debts, setDebts] = useState([]);
  const [cashDeployed, setCashDeployed] = useState([]);
  const [currentPrice, setCurrentPrice] = useState(0.0068);
  const [priceChange, setPriceChange] = useState(null);
  const [lastPriceFetch, setLastPriceFetch] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [logLevel, setLogLevel] = useState(null);
  const [newTrade, setNewTrade] = useState({type:"sell",qty:"",price:"",note:""});
  const [showAddDebt, setShowAddDebt] = useState(false);
  const [newDebt, setNewDebt] = useState({name:"",balance:"",notes:""});
  const [expandedDebt, setExpandedDebt] = useState(null);
  const [showAddCash, setShowAddCash] = useState(false);
  const [newCash, setNewCash] = useState({label:"",amount:"",note:""});
  const [driveStatus, setDriveStatus] = useState("idle");
  const [driveMsg, setDriveMsg] = useState("Not connected");
  const [fileId, setFileId] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const saveTimer = useRef(null);
  const prevPrice = useRef(null);
  const driveRef = useRef(null);

  // ── Google OAuth (implicit flow — works from file://) ──
  function signInGoogle() {
    const cid = clientId || clientIdInput;
    if (!cid) { setShowSetup(true); return; }
    const params = new URLSearchParams({
      client_id: cid,
      redirect_uri: window.location.href.split("?")[0].split("#")[0],
      response_type: "token",
      scope: DRIVE_SCOPE,
      prompt: "consent",
    });
    window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  }

  // ── Handle OAuth redirect token in URL hash ──
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.includes("access_token")) {
      const params = new URLSearchParams(hash.slice(1));
      const token = params.get("access_token");
      if (token) {
        setAuthToken(token);
        driveRef.current = new DriveAPI(token);
        window.history.replaceState(null, "", window.location.pathname);
      }
    }
  }, []);

  // ── Load from Drive once token is set ──
  useEffect(() => {
    if (!authToken) return;
    async function loadData() {
      setDriveStatus("loading"); setDriveMsg("Loading from Drive…");
      try {
        const api = driveRef.current;
        const fid = await api.findFile(DRIVE_FILENAME);
        setFileId(fid);
        if (fid) {
          const data = await api.readFile(fid);
          if (data.levels) setLevels(data.levels.map(l => ({...l, trades: l.trades||[]})));
          if (data.debts) setDebts(data.debts);
          if (data.cashDeployed) setCashDeployed(data.cashDeployed);
          if (data.currentPrice) setCurrentPrice(data.currentPrice);
          setDriveMsg("Loaded ✓"); setDriveStatus("saved");
        } else {
          setDriveMsg("New file — will create on save"); setDriveStatus("idle");
        }
      } catch(e) {
        setDriveMsg("Load failed"); setDriveStatus("error");
      }
      setLoaded(true);
      // fetch live price after load
      const p = await fetchFLRPrice();
      if (p) { prevPrice.current = p; setCurrentPrice(p); setLastPriceFetch(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})); }
    }
    loadData();
  }, [authToken]);

  // ── Also load locally if no auth yet (fallback) ──
  useEffect(() => {
    if (authToken) return;
    try {
      const raw = localStorage.getItem("flr_data");
      if (raw) {
        const d = JSON.parse(raw);
        if (d.levels) setLevels(d.levels.map(l=>({...l,trades:l.trades||[]})));
        if (d.debts) setDebts(d.debts);
        if (d.cashDeployed) setCashDeployed(d.cashDeployed);
        if (d.currentPrice) setCurrentPrice(d.currentPrice);
      }
    } catch {}
    setLoaded(true);
    fetchFLRPrice().then(p => { if (p) { prevPrice.current=p; setCurrentPrice(p); setLastPriceFetch(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})); }});
  }, []);

  // ── Auto-save ──
  useEffect(() => {
    if (!loaded) return;
    const data = { levels, debts, cashDeployed, currentPrice };
    // always save locally as fallback
    localStorage.setItem("flr_data", JSON.stringify(data));
    if (!authToken) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setDriveStatus("saving"); setDriveMsg("Saving…");
    saveTimer.current = setTimeout(async () => {
      try {
        const newId = await driveRef.current.writeFile(fileId, data);
        if (newId && newId !== fileId) setFileId(newId);
        setDriveStatus("saved"); setDriveMsg("Saved to Drive ✓");
      } catch { setDriveStatus("error"); setDriveMsg("Save failed"); }
    }, 3000);
  }, [levels, debts, cashDeployed, currentPrice, loaded]);

  // ── Price refresh every 60s ──
  useEffect(() => {
    const iv = setInterval(async () => {
      const p = await fetchFLRPrice();
      if (p) {
        setPriceChange(prevPrice.current ? ((p-prevPrice.current)/prevPrice.current)*100 : null);
        prevPrice.current = p; setCurrentPrice(p);
        setLastPriceFetch(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
      }
    }, 60000);
    return () => clearInterval(iv);
  }, []);

  async function refreshPrice() {
    const p = await fetchFLRPrice();
    if (p) { setPriceChange(prevPrice.current?((p-prevPrice.current)/prevPrice.current)*100:null); prevPrice.current=p; setCurrentPrice(p); setLastPriceFetch(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})); }
  }

  // ── Derived ──
  const TOTAL_TOKENS = 5857761;
  function levelStats(l) {
    const sells=l.trades.filter(t=>t.type==="sell"), buys=l.trades.filter(t=>t.type==="buy");
    return {
      netQty: sells.reduce((a,t)=>a+t.qty,0)-buys.reduce((a,t)=>a+t.qty,0),
      netValue: sells.reduce((a,t)=>a+t.qty*t.price,0)-buys.reduce((a,t)=>a+t.qty*t.price,0),
      totalSoldQty: sells.reduce((a,t)=>a+t.qty,0),
      totalBoughtQty: buys.reduce((a,t)=>a+t.qty,0),
    };
  }
  const lws = levels.map(l=>({...l,...levelStats(l)}));
  const totalNetValue = lws.reduce((a,l)=>a+l.netValue,0);
  const totalNetQty   = lws.reduce((a,l)=>a+l.netQty,0);
  const totalSoldQty  = lws.reduce((a,l)=>a+l.totalSoldQty,0);
  const totalBoughtBack = lws.reduce((a,l)=>a+l.totalBoughtQty,0);
  const tokensHeld    = TOTAL_TOKENS - totalSoldQty + totalBoughtBack;
  const totalCash     = cashDeployed.reduce((a,c)=>a+(parseFloat(c.amount)||0),0);
  const totalRaised   = totalNetValue + totalCash;
  const target        = debts.reduce((a,d)=>a+(parseFloat(d.balance)||0),0);
  const remaining     = Math.max(0,target-totalRaised);
  const progress      = target>0?Math.min(100,(totalRaised/target)*100):0;
  let cum=0;
  const ld = lws.map(l=>{ cum+=l.netValue; return {...l,cumVal:cum}; });

  // ── Mutations ──
  function addTrade(li) {
    const q=parseFloat(newTrade.qty), p=parseFloat(newTrade.price)||levels[li].price;
    if (!q||q<=0) return;
    const t={id:uid(),type:newTrade.type,qty:q,price:p,date:new Date().toISOString().slice(0,10),note:newTrade.note};
    setLevels(prev=>{const n=[...prev]; n[li]={...n[li],trades:[...n[li].trades,t]}; return n;});
    setNewTrade(t=>({...t,qty:"",note:""}));
  }
  function removeTrade(li,tid) {
    setLevels(prev=>{const n=[...prev]; n[li]={...n[li],trades:n[li].trades.filter(t=>t.id!==tid)}; return n;});
  }
  function addDebt() {
    if (!newDebt.name||!newDebt.balance) return;
    setDebts(d=>[...d,{id:uid(),name:newDebt.name,balance:parseFloat(newDebt.balance),notes:newDebt.notes}]);
    setNewDebt({name:"",balance:"",notes:""}); setShowAddDebt(false);
  }
  function updateDebt(id,field,val) {
    setDebts(d=>d.map(x=>x.id===id?{...x,[field]:field==="balance"?parseFloat(val)||0:val}:x));
  }
  function addCash() {
    if (!newCash.label||!newCash.amount) return;
    setCashDeployed(c=>[...c,{id:uid(),label:newCash.label,amount:parseFloat(newCash.amount),note:newCash.note,date:new Date().toISOString().slice(0,10)}]);
    setNewCash({label:"",amount:"",note:""}); setShowAddCash(false);
  }

  const driveColor = {idle:C.muted,loading:C.blue,saving:C.gold,saved:C.accent,error:C.red}[driveStatus];

  const TabBtn = ({id,label}) => (

  );

  // ── Setup screen ──
  if (showSetup || (GOOGLE_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID_HERE" && !clientId && !authToken)) {
    return (

          <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginBottom:24}}>SETUP — ONE TIME ONLY</div>
          <div style={{fontSize:12,color:C.text,lineHeight:1.8,marginBottom:20}}>
            To sync across devices, you need a free Google OAuth Client ID.<br/><br/>
            <span style={{color:C.gold}}>1.</span> Go to <a href="https://console.cloud.google.com" target="_blank" style={{color:C.accent}}>console.cloud.google.com</a><br/>
            <span style={{color:C.gold}}>2.</span> New project → APIs &amp; Services → Enable <b>Google Drive API</b><br/>
            <span style={{color:C.gold}}>3.</span> Credentials → Create → OAuth 2.0 → Web application<br/>
            <span style={{color:C.gold}}>4.</span> Authorised JS origins: add <code style={{color:C.gold,fontSize:11}}>file://</code> and your iCloud file path<br/>
            <span style={{color:C.gold}}>5.</span> Paste Client ID below
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:6,letterSpacing:1}}>GOOGLE CLIENT ID</div>
            <input style={inp()} placeholder="xxxxxxxx.apps.googleusercontent.com" value={clientIdInput} onChange={e=>setClientIdInput(e.target.value)} />
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <Btn onClick={()=>{ if(clientIdInput){localStorage.setItem("flr_gclient",clientIdInput); setClientId(clientIdInput); setShowSetup(false); } }}>SAVE CLIENT ID</Btn>
            <Btn onClick={()=>setShowSetup(false)} color={C.muted}>USE WITHOUT DRIVE</Btn>
          </div>
          <div style={{fontSize:10,color:C.muted,marginTop:16}}>Without Drive, data saves to browser/app local storage only.</div>
        </div>
      </div>
    );
  }

  // ── Log modal ──
  const LogModal = () => {
    if (logLevel===null) return null;
    const l=ld[logLevel];
    const pct=l.tokens>0?Math.min(100,(l.netQty/l.tokens)*100):0;
    return (
      <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setLogLevel(null);}}>
        <div className="modal">
          <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <span style={{fontSize:18,fontWeight:700,color:C.gold}}>${l.price.toFixed(4)}</span>
              <span style={{fontSize:11,color:C.muted,marginLeft:8}}>· {fmtTok(l.tokens)} target tokens</span>
            </div>
            <Btn onClick={()=>setLogLevel(null)} color={C.muted} small>✕ CLOSE</Btn>
          </div>

          <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            {[{label:"NET SOLD",val:fmtTok(l.netQty),color:l.netQty>=l.tokens?C.accent:C.gold},{label:"NET VALUE",val:fmtUSD(l.netValue),color:C.accent},{label:"BUYBACKS",val:fmtTok(l.totalBoughtQty||0),color:l.totalBoughtQty>0?C.blue:C.muted}]
              .map(({label,val,color})=>(
              <div key={label}>
                <div style={{fontSize:9,color:C.muted,letterSpacing:2,marginBottom:4}}>{label}</div>
                <div style={{fontSize:18,fontWeight:700,color}}>{val}</div>
              </div>
            ))}
          </div>
          <div style={{padding:"8px 20px 14px",borderBottom:`1px solid ${C.border}`}}>
            <Bar pct={pct} color={l.netQty>=l.tokens?C.accent:C.gold}/>
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>{fmt(pct,0)}% filled (net)</div>
          </div>

          <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.accent,letterSpacing:2,marginBottom:10}}>LOG TRADE</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:4}}>TYPE</div>
                <select style={inp()} value={newTrade.type} onChange={e=>setNewTrade(t=>({...t,type:e.target.value}))}>
                  <option value="sell">SELL</option>
                  <option value="buy">BUY BACK</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:4}}>QUANTITY</div>
                <input style={inp()} type="number" placeholder="tokens" value={newTrade.qty} onChange={e=>setNewTrade(t=>({...t,qty:e.target.value}))}/>
              </div>
              <div>
                <div style={{fontSize:9,color:C.muted,marginBottom:4}}>PRICE ($)</div>
                <input style={inp({color:C.gold})} type="number" step="0.0001" value={newTrade.price||l.price} onChange={e=>setNewTrade(t=>({...t,price:e.target.value}))}/>
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:4}}>NOTE</div>
              <input style={inp()} placeholder="e.g. 20% pullback buyback..." value={newTrade.note} onChange={e=>setNewTrade(t=>({...t,note:e.target.value}))}/>
            </div>
            <Btn onClick={()=>addTrade(logLevel)}>+ LOG TRADE</Btn>
          </div>

          <div style={{padding:"14px 20px"}}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:10}}>HISTORY</div>
            {l.trades.length===0&&<div style={{color:C.muted,fontSize:11,fontStyle:"italic"}}>No trades yet</div>}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[...l.trades].reverse().map(t=>(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:C.card,borderRadius:6,border:`1px solid ${C.border}`,flexWrap:"wrap"}}>
                  <Tag color={t.type==="sell"?C.accent:C.blue}>{t.type==="sell"?"SELL":"BUY"}</Tag>
                  <span style={{fontWeight:600}}>{fmtTok(t.qty)}</span>
                  <span style={{color:C.muted}}>@</span>
                  <span style={{color:C.gold}}>${t.price.toFixed(4)}</span>
                  <span style={{color:t.type==="sell"?C.accent:C.red,marginLeft:"auto",fontWeight:700}}>{t.type==="sell"?"+":"-"}{fmtUSD(t.qty*t.price)}</span>
                  <span style={{fontSize:10,color:C.muted}}>{t.date}</span>
                  {t.note&&<span style={{fontSize:10,color:C.muted,fontStyle:"italic"}}>— {t.note}</span>}
                  <button onClick={()=>removeTrade(logLevel,t.id)} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:14}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <LogModal/>

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,letterSpacing:3,color:C.accent}}>⬡ FLR TRACKER</div>
          <div style={{fontSize:9,color:C.muted,letterSpacing:4}}>DEBT PAYOFF PLAN</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
          {/* Price */}
          <div>
            <div style={{fontSize:9,color:C.muted,marginBottom:2}}>FLR/USD {lastPriceFetch&&<span>· {lastPriceFetch}</span>}</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:20,fontWeight:700,color:C.gold}}>${currentPrice.toFixed(6)}</span>
              {priceChange!==null&&<span style={{fontSize:11,color:priceChange>=0?C.accent:C.red}}>{priceChange>=0?"▲":"▼"}{Math.abs(priceChange).toFixed(2)}%</span>}
              <button onClick={refreshPrice} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:12}}>↻</button>
            </div>
          </div>
          <div style={{fontSize:11,color:C.muted,borderLeft:`1px solid ${C.border}`,paddingLeft:14}}>
            Held: <span style={{color:C.text}}>{fmtTok(tokensHeld)}</span>
            <span style={{margin:"0 8px",color:C.border}}>|</span>
            ≈ <span style={{color:C.text}}>{fmtUSD(tokensHeld*currentPrice)}</span>
          </div>
          {/* Drive status */}
          <div style={{display:"flex",alignItems:"center",gap:6,borderLeft:`1px solid ${C.border}`,paddingLeft:14}}>
            {authToken ? (
              <>
                <div style={{width:7,height:7,borderRadius:"50%",background:driveColor,flexShrink:0}} className={driveStatus==="saving"?"pulse":""}/>
                <span style={{fontSize:10,color:driveColor}}>{driveMsg}</span>
              </>
            ) : (
              <button className="g-signin" onClick={signInGoogle}>
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
              </button>
            )}
            <button onClick={()=>setShowSetup(true)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"4px 8px",cursor:"pointer",fontSize:10}}>⚙</button>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,padding:"10px 20px",background:C.surface,borderBottom:`1px solid ${C.border}`,flexWrap:"wrap"}}>
        <TabBtn id="dashboard" label="Dashboard"/>
        <TabBtn id="sells" label="Sell Plan"/>
        <TabBtn id="debts" label="Debts"/>
        <TabBtn id="cash" label="Cash"/>
      </div>

      <div style={{padding:20,maxWidth:980,margin:"0 auto"}}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard"&&<>
          <div style={card({marginBottom:16})}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:10,letterSpacing:2,color:C.muted,marginBottom:6}}>RAISED vs TARGET</div>
                <div style={{display:"flex",alignItems:"baseline",gap:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:34,fontWeight:700,color:C.accent,lineHeight:1}}>{fmtUSD(totalRaised)}</span>
                  <span style={{fontSize:18,color:C.muted}}>/ {fmtUSD(target)}</span>
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:6,display:"flex",gap:16}}>
                  <span>FLR: <span style={{color:C.text}}>{fmtUSD(totalNetValue)}</span></span>
                  <span>Cash: <span style={{color:C.gold}}>{fmtUSD(totalCash)}</span></span>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:4}}>STILL NEEDED</div>
                <div style={{fontSize:26,fontWeight:700,color:remaining>0?C.red:C.accent}}>{fmtUSD(remaining)}</div>
                <div style={{fontSize:10,color:C.muted,marginTop:4}}>{fmt(progress,1)}% complete</div>
              </div>
            </div>
            <Bar pct={progress} color={C.accent} h={8}/>
            {target===0&&<div style={{fontSize:10,color:C.muted,marginTop:6,fontStyle:"italic"}}>Add debts to set your target</div>}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
            {[
              {label:"NET SOLD",val:fmtTok(totalNetQty),sub:`${fmtUSD(totalNetValue)} realised`,color:C.accent,pct:totalNetQty/TOTAL_TOKENS*100},
              {label:"TOKENS HELD",val:fmtTok(tokensHeld),sub:`≈ ${fmtUSD(tokensHeld*currentPrice)} now`,color:C.blue,pct:tokensHeld/TOTAL_TOKENS*100},
              {label:"CASH DEPLOYED",val:fmtUSD(totalCash),sub:`${cashDeployed.length} entries · to replenish`,color:C.gold,pct:target>0?(totalCash/target)*100:0},
            ].map(({label,val,sub,color,pct})=>(
              <div key={label} style={card()}>
                <div style={{fontSize:9,color:C.muted,letterSpacing:2,marginBottom:8}}>{label}</div>
                <div style={{fontSize:18,fontWeight:700,color}}>{val}</div>
                <div style={{fontSize:10,color:C.muted,margin:"4px 0 8px"}}>{sub}</div>
                <Bar pct={pct} color={color}/>
              </div>
            ))}
          </div>

          {debts.length>0&&<div style={card()}>
            <div style={{fontSize:9,color:C.muted,letterSpacing:2,marginBottom:14}}>DEBT BREAKDOWN</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {debts.map((d,i)=>{
                const bal=parseFloat(d.balance)||0;
                const share=target>0?(bal/target)*100:0;
                const covered=Math.min(bal,target>0?(bal/target)*totalRaised:0);
                const pct=bal>0?(covered/bal)*100:0;
                const hue=HUES[i%HUES.length];
                return <div key={d.id}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:hue,flexShrink:0}}/>
                      <span>{d.name}</span>
                      {d.notes&&<span style={{fontSize:10,color:C.muted,fontStyle:"italic"}}>— {d.notes}</span>}
                    </div>
                    <div style={{display:"flex",gap:14}}>
                      <span style={{color:C.muted,fontSize:10}}>{fmt(share,0)}%</span>
                      <span style={{color:hue,fontWeight:600}}>{fmtUSD(bal)}</span>
                    </div>
                  </div>
                  <Bar pct={pct} color={hue}/>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                    <span style={{fontSize:10,color:C.muted}}>{fmtUSD(covered)} covered</span>
                    <span style={{fontSize:10,color:C.muted}}>{fmtUSD(Math.max(0,bal-covered))} left · {fmt(pct,0)}%</span>
                  </div>
                </div>;
              })}
            </div>
          </div>}
        </>}

        {/* ── SELL PLAN ── */}
        {tab==="sells"&&<>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <span style={{fontSize:11,color:C.muted}}>{fmtUSD(totalNetValue)} net · {ld.filter(l=>l.netQty>=l.tokens).length} complete{totalBoughtBack>0?` · ${fmtTok(totalBoughtBack)} bought back`:""}</span>
            <span style={{fontSize:11,color:C.muted}}>tap row → trade log</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr>{["Price","Target","Net Sold","Buybacks","Net Value","Cumulative","Status"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {ld.map((row,i)=>{
                  const done=row.netQty>=row.tokens, partial=row.netQty>0&&!done, hasBuys=row.trades.some(t=>t.type==="buy");
                  return <tr key={i} onClick={()=>{setNewTrade({type:"sell",qty:"",price:row.price,note:""});setLogLevel(i);}} style={{cursor:"pointer",background:done?"#00e5b008":hasBuys?"#4da6ff06":"transparent"}}>
                    <td style={{color:C.gold,fontWeight:700}}>${row.price.toFixed(4)}</td>
                    <td style={{color:C.muted}}>{fmtTok(row.tokens)}</td>
                    <td style={{color:done?C.accent:partial?C.gold:C.text,fontWeight:done||partial?700:400}}>{fmtTok(Math.max(0,row.netQty))}</td>
                    <td style={{color:hasBuys?C.blue:C.muted}}>{hasBuys?fmtTok(row.totalBoughtQty):"—"}</td>
                    <td style={{color:row.netValue>0?C.accent:C.muted}}>{row.netValue>0?fmtUSD(row.netValue):"—"}</td>
                    <td>{row.cumVal>0?fmtUSD(row.cumVal):"—"}</td>
                    <td>{done?<Tag color={C.accent}>DONE</Tag>:partial?<Tag color={C.gold}>PARTIAL</Tag>:hasBuys?<Tag color={C.blue}>BUYBACK</Tag>:<Tag color={C.muted}>OPEN</Tag>}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── DEBTS ── */}
        {tab==="debts"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:11,color:C.muted}}>Dynamic target: <span style={{color:C.text,fontWeight:700}}>{fmtUSD(target)}</span></span>
            <Btn onClick={()=>setShowAddDebt(!showAddDebt)}>+ ADD BALANCE</Btn>
          </div>
          {showAddDebt&&<div style={card({marginBottom:16,borderColor:C.accent+"40"})}>
            <div style={{fontSize:10,color:C.accent,letterSpacing:2,marginBottom:12}}>NEW BALANCE</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:10}}>
              <div><div style={{fontSize:9,color:C.muted,marginBottom:4}}>LABEL</div><input style={inp()} placeholder="e.g. Barclaycard..." value={newDebt.name} onChange={e=>setNewDebt({...newDebt,name:e.target.value})}/></div>
              <div><div style={{fontSize:9,color:C.muted,marginBottom:4}}>BALANCE ($)</div><input style={inp()} type="number" value={newDebt.balance} onChange={e=>setNewDebt({...newDebt,balance:e.target.value})}/></div>
            </div>
            <div style={{marginBottom:12}}><div style={{fontSize:9,color:C.muted,marginBottom:4}}>NOTES</div><input style={inp()} placeholder="Interest rate, priority..." value={newDebt.notes} onChange={e=>setNewDebt({...newDebt,notes:e.target.value})}/></div>
            <div style={{display:"flex",gap:8}}><Btn onClick={addDebt}>SAVE</Btn><Btn onClick={()=>setShowAddDebt(false)} color={C.muted}>CANCEL</Btn></div>
          </div>}
          {debts.length===0&&!showAddDebt&&<div style={{textAlign:"center",padding:60,color:C.muted,fontStyle:"italic"}}>No balances yet.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {debts.map((d,i)=>{
              const bal=parseFloat(d.balance)||0, hue=HUES[i%HUES.length];
              const covered=Math.min(bal,target>0?(bal/target)*totalRaised:0);
              const pct=bal>0?(covered/bal)*100:0, isExp=expandedDebt===d.id;
              return <div key={d.id} style={card({borderLeft:`3px solid ${hue}`})}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:120}}>
                    <input style={{...inp(),background:"transparent",border:"none",borderBottom:`1px solid ${C.border}`,borderRadius:0,paddingLeft:0,fontSize:14,fontWeight:600}} value={d.name} onChange={e=>updateDebt(d.id,"name",e.target.value)}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <span style={{color:C.muted}}>$</span>
                    <input style={inp({width:110,color:hue,fontWeight:700,fontSize:16,textAlign:"right"})} type="number" value={d.balance} onChange={e=>updateDebt(d.id,"balance",e.target.value)}/>
                  </div>
                  <button onClick={()=>setExpandedDebt(isExp?null:d.id)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"5px 10px",cursor:"pointer"}}>{isExp?"▲":"▼"}</button>
                  <button onClick={()=>setDebts(d=>d.filter(x=>x.id!==d.id))} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"5px 10px",cursor:"pointer"}} onClick={()=>setDebts(prev=>prev.filter(x=>x.id!==d.id))}>✕</button>
                </div>
                <div style={{marginTop:10}}><Bar pct={pct} color={hue}/><div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><span style={{fontSize:10,color:C.muted}}>{fmtUSD(covered)} covered</span><span style={{fontSize:10,color:C.muted}}>{fmtUSD(Math.max(0,bal-covered))} left · {fmt(pct,0)}%</span></div></div>
                {isExp&&<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}><div style={{fontSize:9,color:C.muted,marginBottom:4}}>NOTES</div><input style={inp({color:C.muted,fontStyle:"italic"})} value={d.notes||""} onChange={e=>updateDebt(d.id,"notes",e.target.value)}/></div>}
              </div>;
            })}
          </div>
          {debts.length>0&&<div style={card({marginTop:14,borderColor:C.accent+"30",display:"flex",justifyContent:"space-between",alignItems:"center"})}><span style={{color:C.muted}}>TOTAL TARGET</span><span style={{fontSize:24,fontWeight:700}}>{fmtUSD(target)}</span></div>}
        </>}

        {/* ── CASH ── */}
        {tab==="cash"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <span style={{fontSize:11,color:C.muted}}>Deployed: <span style={{color:C.gold,fontWeight:700}}>{fmtUSD(totalCash)}</span></span>
              <span style={{fontSize:11,color:C.muted,marginLeft:16}}>To replenish: <span style={{color:C.red}}>{fmtUSD(totalCash)}</span></span>
            </div>
            <Btn onClick={()=>setShowAddCash(!showAddCash)}>+ LOG CASH</Btn>
          </div>
          {showAddCash&&<div style={card({marginBottom:16,borderColor:C.gold+"40"})}>
            <div style={{fontSize:10,color:C.gold,letterSpacing:2,marginBottom:12}}>LOG CASH DEPLOYED</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:10}}>
              <div><div style={{fontSize:9,color:C.muted,marginBottom:4}}>DESCRIPTION</div><input style={inp()} placeholder="e.g. Paid Barclaycard from savings..." value={newCash.label} onChange={e=>setNewCash({...newCash,label:e.target.value})}/></div>
              <div><div style={{fontSize:9,color:C.muted,marginBottom:4}}>AMOUNT ($)</div><input style={inp({color:C.gold})} type="number" value={newCash.amount} onChange={e=>setNewCash({...newCash,amount:e.target.value})}/></div>
            </div>
            <div style={{marginBottom:12}}><div style={{fontSize:9,color:C.muted,marginBottom:4}}>NOTE</div><input style={inp()} value={newCash.note} onChange={e=>setNewCash({...newCash,note:e.target.value})}/></div>
            <div style={{display:"flex",gap:8}}><Btn onClick={addCash} color={C.gold}>SAVE</Btn><Btn onClick={()=>setShowAddCash(false)} color={C.muted}>CANCEL</Btn></div>
          </div>}
          {cashDeployed.length===0&&!showAddCash&&<div style={{textAlign:"center",padding:60,color:C.muted,fontStyle:"italic"}}>No cash entries yet.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {cashDeployed.map(c=>(
              <div key={c.id} style={card({display:"flex",alignItems:"center",gap:12,borderLeft:`3px solid ${C.gold}`})}>
                <div style={{flex:1}}><div style={{fontWeight:600}}>{c.label}</div>{c.note&&<div style={{fontSize:10,color:C.muted,fontStyle:"italic",marginTop:2}}>{c.note}</div>}<div style={{fontSize:10,color:C.muted,marginTop:2}}>{c.date}</div></div>
                <div style={{fontSize:20,fontWeight:700,color:C.gold}}>{fmtUSD(c.amount)}</div>
                <button onClick={()=>setCashDeployed(prev=>prev.filter(x=>x.id!==c.id))} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"5px 10px",cursor:"pointer"}}>✕</button>
              </div>
            ))}
          </div>
          {cashDeployed.length>0&&<div style={card({marginTop:14,borderColor:C.gold+"30"})}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{color:C.muted}}>Total deployed</span><span style={{fontSize:22,fontWeight:700,color:C.gold}}>{fmtUSD(totalCash)}</span></div>
            <div style={{fontSize:11,color:C.muted,marginBottom:8}}>Needs replenishing via FLR sells — counts toward {fmtUSD(target)} target.</div>
            <Bar pct={target>0?(totalCash/target)*100:0} color={C.gold}/>
          </div>}
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
