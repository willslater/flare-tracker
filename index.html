const C = {

const fmt  = (n,dp=2) => isNaN(n)?"0.00":Math.abs(n).toLocaleString("en-GB",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const fmtU = n => "$"+fmt(n);

const today= () => new Date().toISOString().slice(0,10);

const Bar = ({pct,color,h=5}) => (

// Stable text input — avoids re-render jumps by using defaultValue + onBlur
const Field = ({label, defaultVal, onChange, placeholder, type="text", color, prefix}) => {
  const ref = useRef(null);
  useEffect(()=>{ if(ref.current && document.activeElement!==ref.current) ref.current.value=defaultVal||""; },[defaultVal]);
  return (
    <div>
      {label&&<Lbl ch={label}/>}
      <div style={{position:"relative",display:"flex",alignItems:"center"}}>
        {prefix&&<span style={{position:"absolute",left:12,color:C.muted,fontSize:14,pointerEvents:"none"}}>{prefix}</span>}
        <input ref={ref} type={type} inputMode={type==="number"?"decimal":"text"} className="inp"
          style={{color:color||C.text,paddingLeft:prefix?"28px":"12px"}}
          defaultValue={defaultVal||""}
          placeholder={placeholder||""}
          onBlur={e=>onChange(e.target.value)}
          onChange={e=>onChange(e.target.value)}
        />
      </div>
    </div>
  );
};

// ── Google Drive ──
class DriveAPI {
  constructor(t){this.t=t;}
  h(){return{"Authorization":"Bearer "+this.t,"Content-Type":"application/json"};}
  async find(name){
    const q=encodeURIComponent("name='"+name+"' and trashed=false");
    const r=await fetch("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id)",{headers:this.h()});
    const d=await r.json(); return d.files&&d.files[0]?d.files[0].id:null;
  }
  async read(id){
    const r=await fetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media",{headers:this.h()});
    return r.json();
  }
  async write(id,data){
    const body=JSON.stringify(data,null,2);
    if(id){
      await fetch("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media",{method:"PATCH",headers:{"Authorization":"Bearer "+this.t,"Content-Type":"application/json"},body});
      return id;
    }
    const m=await(await fetch("https://www.googleapis.com/drive/v3/files",{method:"POST",headers:this.h(),body:JSON.stringify({name:DRIVE_FILENAME,mimeType:"application/json"})})).json();
    await fetch("https://www.googleapis.com/upload/drive/v3/files/"+m.id+"?uploadType=media",{method:"PATCH",headers:{"Authorization":"Bearer "+this.t,"Content-Type":"application/json"},body});
    return m.id;
  }
}

async function fetchFLR(){
  try{const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=flare-networks&vs_currencies=usd");const d=await r.json();return d&&d["flare-networks"]?d["flare-networks"].usd:null;}catch(e){return null;}
}
async function fetchGBPUSD(){
  try{
    // Use exchangerate-api free tier
    const r=await fetch("https://api.exchangerate-api.com/v4/latest/GBP");
    const d=await r.json();
    return d&&d.rates&&d.rates.USD?d.rates.USD:null;
  }catch(e){
    // fallback: frankfurter
    try{const r=await fetch("https://api.frankfurter.app/latest?from=GBP&to=USD");const d=await r.json();return d&&d.rates&&d.rates.USD?d.rates.USD:null;}catch(e2){return null;}
  }
}

function lStats(l){
  const s=l.trades.filter(t=>t.type==="sell"),b=l.trades.filter(t=>t.type==="buy");
  return{netQty:s.reduce((a,t)=>a+t.qty,0)-b.reduce((a,t)=>a+t.qty,0),sellP:s.reduce((a,t)=>a+t.qty*t.price,0),buyC:b.reduce((a,t)=>a+t.qty*t.price,0),soldQ:s.reduce((a,t)=>a+t.qty,0),boughtQ:b.reduce((a,t)=>a+t.qty,0)};
}

// ════════════════════════════════════════
function App(){
  const storedCid=localStorage.getItem("flr_gclient")||"";
  const [clientId,setClientId]=useState(GOOGLE_CLIENT_ID!=="YOUR_GOOGLE_CLIENT_ID_HERE"?GOOGLE_CLIENT_ID:storedCid);
  const [cidInput,setCidInput]=useState("");
  const [showSetup,setShowSetup]=useState(false);
  const [authToken,setAuthToken]=useState(()=>sessionStorage.getItem("flr_token")||null);

  const [levels,setLevels]        =useState(()=>PLAN.map(l=>({...l,trades:[]})));
  const [debts,setDebts]          =useState([]);
  const [cashItems,setCashItems]  =useState([]);
  const [freeTrades,setFreeTrades]=useState([]);

  const [flrPrice,setFlrPrice]   =useState(0.0068);
  const [gbpusd,setGbpusd]       =useState(1.27);
  const [priceChg,setPriceChg]   =useState(null);
  const [lastFetch,setLastFetch] =useState(null);
  const [rateLabel,setRateLabel] =useState("");

  const [tab,setTab]             =useState("dashboard");
  const [logLvl,setLogLvl]       =useState(null);
  const [showFree,setShowFree]   =useState(false);
  const [showAddDebt,setShowAddDebt]=useState(false);
  const [showAddCash,setShowAddCash]=useState(false);
  const [expandedDebt,setExpandedDebt]=useState(null);

  // Uncontrolled form state via refs — prevents input jumping
  const tradeQtyRef   =useRef(null);
  const tradePriceRef =useRef(null);
  const tradeNoteRef  =useRef(null);
  const [tradeType,setTradeType]=useState("sell");
  const [tradeGuidePrice,setTradeGuidePrice]=useState(0);

  const freeValRef  =useRef(null);
  const freeQtyRef  =useRef(null);
  const freeNoteRef =useRef(null);
  const freeLblRef  =useRef(null);
  const [freeType,setFreeType]=useState("sell");
  const [freeCalc,setFreeCalc]=useState({ppt:0,total:0,qty:0});

  const [drvStatus,setDrvStatus]=useState("idle");
  const [drvMsg,setDrvMsg]      =useState("Not connected");
  const [fileId,setFileId]      =useState(null);
  const [loaded,setLoaded]      =useState(false);

  const saveTimer=useRef(null);
  const prevPrice=useRef(null);
  const driveRef =useRef(null);

  // Init drive ref if token already in session
  useEffect(()=>{
    const t=sessionStorage.getItem("flr_token");
    if(t){ driveRef.current=new DriveAPI(t); setDrvMsg("Session restored"); }
  },[]);

  // OAuth redirect handler
  useEffect(()=>{
    const hash=window.location.hash;
    if(hash.includes("access_token")){
      const p=new URLSearchParams(hash.slice(1));
      const t=p.get("access_token");
      if(t){
        sessionStorage.setItem("flr_token",t);
        setAuthToken(t);
        driveRef.current=new DriveAPI(t);
        window.history.replaceState(null,"",window.location.pathname);
      }
    }
  },[]);

  function applyData(d){
    if(d.levels)     setLevels(d.levels.map(l=>({...l,trades:l.trades||[]})));
    if(d.debts)      setDebts(d.debts);
    if(d.cashItems)  setCashItems(d.cashItems);
    else if(d.cashDeployed) setCashItems(d.cashDeployed.map(c=>({...c,type:"deployed"})));
    if(d.freeTrades) setFreeTrades(d.freeTrades);
    if(d.flrPrice)   setFlrPrice(d.flrPrice);
  }

  // Load from Drive
  useEffect(()=>{
    if(!authToken) return;
    (async()=>{
      setDrvStatus("loading"); setDrvMsg("Loading from Drive…");
      try{
        const api=driveRef.current;
        const fid=await api.find(DRIVE_FILENAME);
        setFileId(fid);
        if(fid){ applyData(await api.read(fid)); setDrvMsg("Loaded ✓"); setDrvStatus("saved"); }
        else    { setDrvMsg("New — saves on first change"); setDrvStatus("idle"); }
      }catch(e){ setDrvMsg("Load failed"); setDrvStatus("error"); }
      setLoaded(true);
      fetchPrices();
    })();
  },[authToken]);

  // Local fallback
  useEffect(()=>{
    if(authToken) return;
    try{ const raw=localStorage.getItem("flr_data"); if(raw) applyData(JSON.parse(raw)); }catch(e){}
    setLoaded(true);
    fetchPrices();
  },[]);

  async function fetchPrices(){
    const [p,r]=await Promise.all([fetchFLR(),fetchGBPUSD()]);
    if(p){ setPriceChg(prevPrice.current?((p-prevPrice.current)/prevPrice.current)*100:null); prevPrice.current=p; setFlrPrice(p); setLastFetch(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})); }
    if(r){ setGbpusd(r); setRateLabel("£1 = $"+r.toFixed(4)); }
  }

  // Auto-save
  useEffect(()=>{
    if(!loaded) return;
    const data={levels,debts,cashItems,freeTrades,flrPrice};
    localStorage.setItem("flr_data",JSON.stringify(data));
    if(!authToken) return;
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setDrvStatus("saving"); setDrvMsg("Saving…");
    saveTimer.current=setTimeout(async()=>{
      try{
        const nid=await driveRef.current.write(fileId,data);
        if(nid&&nid!==fileId) setFileId(nid);
        setDrvStatus("saved"); setDrvMsg("Saved to Drive ✓");
      }catch(e){ setDrvStatus("error"); setDrvMsg("Save failed"); }
    },3000);
  },[levels,debts,cashItems,freeTrades,flrPrice,loaded]);

  // Price refresh
  useEffect(()=>{ const iv=setInterval(fetchPrices,120000); return()=>clearInterval(iv); },[]);

  // Prevent body scroll on iOS when modal open
  function lockBody(){ document.body.style.overflow='hidden'; document.body.style.position='fixed'; document.body.style.width='100%'; }
  function unlockBody(){ document.body.style.overflow=''; document.body.style.position=''; document.body.style.width=''; }

  useEffect(()=>{
    const anyModal = logLvl!==null||showFree||showAddDebt||showAddCash;
    if(anyModal) lockBody(); else unlockBody();
    return ()=>unlockBody();
  },[logLvl,showFree,showAddDebt,showAddCash]);

  function signIn(){
    const cid=clientId||cidInput;
    if(!cid){ setShowSetup(true); return; }
    const params=new URLSearchParams({client_id:cid,redirect_uri:window.location.href.split("?")[0].split("#")[0],response_type:"token",scope:DRIVE_SCOPE,prompt:"select_account"});
    window.location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params.toString();
  }

  // Convert debt to USD
  function debtToUSD(d){ return d.currency==="GBP"?(parseFloat(d.balance)||0)*gbpusd:(parseFloat(d.balance)||0); }

  // ── Derived ──
  const lws=levels.map(l=>({...l,...lStats(l)}));
  const lvlSellP=lws.reduce((a,l)=>a+l.sellP,0), lvlBuyC=lws.reduce((a,l)=>a+l.buyC,0);
  const lvlSoldQ=lws.reduce((a,l)=>a+l.soldQ,0), lvlBoughtQ=lws.reduce((a,l)=>a+l.boughtQ,0);
  const freeSellP=freeTrades.filter(t=>t.type==="sell").reduce((a,t)=>a+(parseFloat(t.totalValue)||0),0);
  const freeBuyC =freeTrades.filter(t=>t.type==="buy").reduce((a,t)=>a+(parseFloat(t.totalValue)||0),0);
  const freeSoldQ=freeTrades.filter(t=>t.type==="sell").reduce((a,t)=>a+(parseFloat(t.qty)||0),0);
  const freeBoughtQ=freeTrades.filter(t=>t.type==="buy").reduce((a,t)=>a+(parseFloat(t.qty)||0),0);
  const totalSellP=lvlSellP+freeSellP, totalBuyC=lvlBuyC+freeBuyC;
  const totalSoldQ=lvlSoldQ+freeSoldQ, totalBoughtQ=lvlBoughtQ+freeBoughtQ;
  const tokensHeld=TOTAL_TOKENS-totalSoldQ+totalBoughtQ;
  const cashDepUSD=cashItems.filter(c=>c.type==="deployed").reduce((a,c)=>a+(parseFloat(c.amount)||0)*gbpusd,0);
  const cashAddUSD=cashItems.filter(c=>c.type==="addition").reduce((a,c)=>a+(parseFloat(c.amount)||0)*gbpusd,0);
  const debtTotalUSD=debts.reduce((a,d)=>a+debtToUSD(d),0);
  const target=debtTotalUSD+totalBuyC+cashAddUSD;
  const raised=totalSellP+cashDepUSD;
  const remaining=Math.max(0,target-raised);
  const progress=target>0?Math.min(100,(raised/target)*100):0;
  const avgNeeded=tokensHeld>0?remaining/tokensHeld:0; // avg price per token to clear debt

  let cum=0;
  const ld=lws.map(l=>{cum+=l.sellP-l.buyC; return{...l,cumVal:cum};});

  // ── Mutations ──
  function addTrade(li){
    const q=parseFloat(tradeQtyRef.current&&tradeQtyRef.current.value);
    const p=parseFloat(tradePriceRef.current&&tradePriceRef.current.value)||levels[li].price;
    const note=tradeNoteRef.current?tradeNoteRef.current.value:"";
    if(!q||q<=0) return;
    const t={id:uid(),type:tradeType,qty:q,price:p,date:today(),note};
    setLevels(prev=>{const n=[...prev]; n[li]={...n[li],trades:[...n[li].trades,t]}; return n;});
    if(tradeQtyRef.current)  tradeQtyRef.current.value="";
    if(tradeNoteRef.current) tradeNoteRef.current.value="";
  }
  function removeTrade(li,tid){
    setLevels(prev=>{const n=[...prev]; n[li]={...n[li],trades:n[li].trades.filter(t=>t.id!==tid)}; return n;});
  }
  function addFreeTrade(){
    const tv=parseFloat(freeValRef.current&&freeValRef.current.value);
    const q=parseFloat(freeQtyRef.current&&freeQtyRef.current.value);
    const note=freeNoteRef.current?freeNoteRef.current.value:"";
    const label=freeLblRef.current?freeLblRef.current.value:"";
    if(!tv||!q||q<=0) return;
    const ppt=tv/q;
    setFreeTrades(f=>[...f,{id:uid(),type:freeType,label:label||(freeType==="sell"?"Sell ":"Buy ")+fmtT(q)+" FLR",totalValue:tv,qty:q,pricePerToken:ppt,note,date:today()}]);
    if(freeValRef.current)  freeValRef.current.value="";
    if(freeQtyRef.current)  freeQtyRef.current.value="";
    if(freeNoteRef.current) freeNoteRef.current.value="";
    if(freeLblRef.current)  freeLblRef.current.value="";
    setFreeCalc({ppt:0,total:0,qty:0});
    setShowFree(false);
  }
  function updateFreeCalc(){
    const tv=parseFloat(freeValRef.current&&freeValRef.current.value)||0;
    const q=parseFloat(freeQtyRef.current&&freeQtyRef.current.value)||0;
    setFreeCalc({ppt:q>0?tv/q:0,total:tv,qty:q});
  }
  function addDebt(name,balance,currency,notes,dtype,collateralQty,collateralVal){
    if(!name||!balance) return;
    const entry={id:uid(),name,balance:parseFloat(balance),currency:currency||"GBP",notes:notes||"",dtype:dtype||"standard"};
    if(dtype==="dex"){
      entry.collateralQty=collateralQty||0;
      entry.collateralVal=collateralVal||0;
      // Liquidation price = borrowed / (collateral tokens * 0.625)
      entry.liqPrice=collateralQty>0?parseFloat(balance)/(collateralQty*0.625):0;
    }
    setDebts(d=>[...d,entry]);
    setShowAddDebt(false);
  }
  function updDebt(id,field,val){
    setDebts(d=>d.map(x=>{
      if(x.id!==id) return x;
      const updated={...x,[field]:field==="balance"||field==="collateralQty"||field==="collateralVal"?parseFloat(val)||0:val};
      if(updated.dtype==="dex"&&updated.collateralQty>0){
        updated.liqPrice=updated.balance/(updated.collateralQty*0.625);
      }
      return updated;
    }));
  }
  function addCash(type,label,amount,note){
    if(!label||!amount) return;
    setCashItems(c=>[...c,{id:uid(),type,label,amount:parseFloat(amount),note:note||"",date:today()}]);
    setShowAddCash(false);
  }

  const drvColor={idle:C.muted,loading:C.blue,saving:C.gold,saved:C.accent,error:C.red}[drvStatus];

  // ── Setup ──
  if(showSetup||(GOOGLE_CLIENT_ID==="YOUR_GOOGLE_CLIENT_ID_HERE"&&!clientId&&!authToken)){

      <div className="setup-overlay">

          <div style={{fontSize:12,color:C.text,lineHeight:2,marginBottom:20}}>
            1. <a href="https://console.cloud.google.com" target="_blank" style={{color:C.accent}}>console.cloud.google.com</a> → new project<br/>
            2. APIs &amp; Services → Enable Google Drive API<br/>
            3. Credentials → OAuth 2.0 → Web application<br/>
            4. JS origins: <code style={{color:C.gold,fontSize:11}}>https://williamslater.github.io</code><br/>
            5. Redirect URIs: <code style={{color:C.gold,fontSize:11}}>https://williamslater.github.io/flare-tracker/</code>
          </div>
          <div style={{marginBottom:12}}>
            <Lbl ch="Google Client ID"/>
            <input className="inp" placeholder="xxxxxxxx.apps.googleusercontent.com" value={cidInput} onChange={e=>setCidInput(e.target.value)}/>
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button className="g-signin" style={{background:C.accentDim,color:C.accent,boxShadow:"none",border:"1px solid "+C.accent+"55"}} onClick={()=>{if(cidInput){localStorage.setItem("flr_gclient",cidInput);setClientId(cidInput);setShowSetup(false);}}}>SAVE & CLOSE</button>
            <button className="g-signin" style={{background:"transparent",color:C.muted,boxShadow:"none",border:"1px solid "+C.border}} onClick={()=>setShowSetup(false)}>USE LOCAL ONLY</button>
          </div>
        </div>
      </div>

  }

  // ── Level log modal ──
  const LogModal=()=>{

    const netVal=l.sellP-l.buyC;

    return(

          <div className="sect" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>

              <span style={{fontSize:11,color:C.muted,marginLeft:8}}>guide · {fmtT(l.tokens)} plan tokens</span>
            </div>
            <button onClick={()=>setLogLvl(null)} style={{background:"transparent",border:"1px solid "+C.border,color:C.muted,borderRadius:5,padding:"5px 12px",cursor:"pointer"}}>✕</button>
          </div>
          <div className="sect">
            <div className="grid4" style={{marginBottom:12}}>
              {[{l:"NET QTY",v:fmtT(l.netQty),c:l.netQty>=l.tokens?C.accent:C.gold},{l:"SELL $",v:fmtU(l.sellP),c:C.accent},{l:"BUY $",v:fmtU(l.buyC),c:l.buyC>0?C.red:C.muted},{l:"NET",v:fmtU(netVal),c:netVal>=0?C.accent:C.red}].map(x=>(
                <div key={x.l}><div className="lbl">{x.l}</div><div style={{fontSize:15,fontWeight:700,color:x.c}}>{x.v}</div></div>
              ))}
            </div>
            <Bar pct={pct} color={l.netQty>=l.tokens?C.accent:C.gold} h={5}/>
            <div style={{fontSize:10,color:C.muted,marginTop:4}}>{fmt(pct,0)}% filled (net)</div>
          </div>
          <div className="sect">
            <div className="lbl" style={{marginBottom:10}}>LOG TRADE</div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {["sell","buy"].map(type=>(

                  {type==="sell"?"▲ SELL":"▼ BUY"}
                </button>
              ))}
            </div>
            {tradeType==="buy"&&<div style={{background:C.red+"10",border:"1px solid "+C.red+"30",borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:11,color:C.red}}>Buy cost added to target (money to recover)</div>}
            <div className="grid2" style={{marginBottom:10}}>
              <div>
                <Lbl ch="Quantity (tokens)"/>
                <input ref={tradeQtyRef} type="number" inputMode="decimal" className="inp" placeholder="0" defaultValue=""/>
              </div>
              <div>
                <Lbl ch={"Actual Price — guide: "+l.price.toFixed(4)}/>
                <input ref={tradePriceRef} type="number" inputMode="decimal" className="inp" style={{color:C.gold}} placeholder={l.price.toFixed(4)} defaultValue={l.price}/>
              </div>
            </div>

              <Lbl ch="Note (optional)"/>
              <input ref={tradeNoteRef} type="text" className="inp" placeholder="e.g. 20% pullback buy..." defaultValue=""/>
            </div>
            <button onClick={()=>addTrade(logLvl)} style={{background:(tradeType==="sell"?C.accent:C.red)+"18",border:"1px solid "+(tradeType==="sell"?C.accent:C.red)+"55",color:tradeType==="sell"?C.accent:C.red,borderRadius:5,padding:"10px 18px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,letterSpacing:1}}>
              + LOG {tradeType.toUpperCase()}
            </button>

          <div style={{padding:"14px 16px"}}>

            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[...l.trades].reverse().map(t=>(

                  <span style={{fontSize:10,color:C.muted}}>{t.date}</span>

                  <button onClick={()=>removeTrade(logLvl,t.id)} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",fontSize:16,marginLeft:"auto"}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ── Free trade modal ──
  const FreeModal=()=>{

              <div>
                <Lbl ch="Token Quantity"/>
                <input ref={freeQtyRef} type="number" inputMode="decimal" className="inp" style={{color:C.gold}} placeholder="e.g. 500000" defaultValue="" onBlur={updateFreeCalc} onChange={updateFreeCalc}/>

            </div>
            {freeCalc.ppt>0&&(
              <div style={{background:C.card2,borderRadius:8,padding:"12px 14px",marginBottom:14}} className="grid3">
                {[{l:"Price/token",v:"$"+freeCalc.ppt.toFixed(6),c:C.gold},{l:"Total",v:fmtU(freeCalc.total),c:freeType==="sell"?C.accent:C.red},{l:"Qty",v:fmtT(freeCalc.qty),c:C.text}].map(x=>(
                  <div key={x.l}><div className="lbl">{x.l}</div><div style={{fontSize:13,fontWeight:700,color:x.c}}>{x.v}</div></div>
                ))}
              </div>
            )}
            <div style={{marginBottom:14}}>
              <Lbl ch="Note (optional)"/>
              <input ref={freeNoteRef} type="text" className="inp" placeholder="Exchange, context..." defaultValue=""/>

            <button onClick={addFreeTrade} style={{background:(freeType==="sell"?C.accent:C.red)+"18",border:"1px solid "+(freeType==="sell"?C.accent:C.red)+"55",color:freeType==="sell"?C.accent:C.red,borderRadius:5,padding:"10px 18px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,letterSpacing:1,width:"100%"}}>
              + LOG {freeType.toUpperCase()}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ── Add Debt modal ──
  const DebtModal=()=>{
    if(!showAddDebt) return null;
    const nameRef=useRef(null),balRef=useRef(null),notesRef=useRef(null);
    const collateralQtyRef=useRef(null),collateralValRef=useRef(null);
    const [cur,setCur]=useState("GBP");
    const [dtype,setDtype]=useState("standard");
    return(
      <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setShowAddDebt(false);}}>
        <div className="modal">
          <div className="sect" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700}}>Add Debt / Balance</div>
            <button onClick={()=>setShowAddDebt(false)} style={{background:"transparent",border:"1px solid "+C.border,color:C.muted,borderRadius:5,padding:"5px 12px",cursor:"pointer"}}>✕</button>
          </div>
          <div style={{padding:"16px"}}>
            <div style={{marginBottom:12}}><Lbl ch="Label"/><input ref={nameRef} type="text" className="inp" placeholder="e.g. Barclaycard, Overdraft..."/></div>
            {/* Debt type */}
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[{v:"standard",l:"STANDARD",s:"Credit card, loan etc"},{v:"dex",l:"DEX",s:"Collateral + borrow"}].map(x=>(
                <button key={x.v} onClick={()=>setDtype(x.v)} style={{flex:1,padding:"10px 8px",borderRadius:6,cursor:"pointer",fontFamily:"inherit",border:"2px solid "+(dtype===x.v?(x.v==="dex"?C.purple:C.accent):C.border),background:dtype===x.v?(x.v==="dex"?C.purple+"15":C.accentDim):"transparent",transition:"all .15s"}}>
                  <div style={{fontWeight:700,fontSize:11,color:dtype===x.v?(x.v==="dex"?C.purple:C.accent):C.muted,letterSpacing:1}}>{x.l}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{x.s}</div>
                </button>
              ))}
            </div>

            <div className="grid2" style={{marginBottom:12}}>
              <div>
                <Lbl ch={dtype==="dex"?"Borrowed Amount (debt)":"Balance"}/>
                <input ref={balRef} type="number" inputMode="decimal" className="inp" placeholder="0.00"/>
              </div>
              <div>
                <Lbl ch="Currency"/>
                <div style={{display:"flex",gap:6}}>
                  {["GBP","USD"].map(c=>(
                    <button key={c} onClick={()=>setCur(c)} style={{flex:1,padding:"10px",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,border:"2px solid "+(cur===c?C.gold:C.border),background:cur===c?C.gold+"15":"transparent",color:cur===c?C.gold:C.muted,transition:"all .15s"}}>

                  <div><Lbl ch="Collateral Value ($)"/><input ref={collateralValRef} type="number" inputMode="decimal" className="inp" style={{color:C.gold}} placeholder="e.g. 6800.00"/></div>

              const cval=dtype==="dex"&&collateralValRef.current?parseFloat(collateralValRef.current.value)||0:0;
              addDebt(name,bal,cur,notes,dtype,cqty,cval);

              SAVE

          </div>
        </div>
      </div>
    );

        <div className="modal">

            <div style={{fontWeight:700}}>Add Cash Entry</div>
            <button onClick={()=>setShowAddCash(false)} style={{background:"transparent",border:"1px solid "+C.border,color:C.muted,borderRadius:5,padding:"5px 12px",cursor:"pointer"}}>✕</button>
          </div>
          <div style={{padding:"16px"}}>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[{v:"deployed",l:"DEPLOYED",s:"Counts toward raised"},{v:"addition",l:"ADDITION",s:"Adds to target"}].map(x=>{
                const col=x.v==="deployed"?C.gold:C.purple;
                return(
                  <button key={x.v} onClick={()=>setCtype(x.v)} style={{flex:1,padding:"10px 8px",borderRadius:6,cursor:"pointer",fontFamily:"inherit",border:"2px solid "+(ctype===x.v?col:C.border),background:ctype===x.v?col+"15":"transparent",transition:"all .15s"}}>
                    <div style={{fontWeight:700,fontSize:11,color:ctype===x.v?col:C.muted,letterSpacing:1}}>{x.l}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{x.s}</div>
                  </button>

              })}
            </div>
            <div style={{background:(ctype==="deployed"?C.gold:C.purple)+"10",border:"1px solid "+(ctype==="deployed"?C.gold:C.purple)+"30",borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:11,color:ctype==="deployed"?C.gold:C.purple}}>
              Cash always in £ — converted at live rate ({rateLabel||"loading..."})
            </div>
            <div className="grid2" style={{marginBottom:12}}>
              <div><Lbl ch="Description"/><input ref={lblRef} type="text" className="inp" placeholder="e.g. Paid Barclaycard..."/></div>
              <div><Lbl ch="Amount (£)"/><input ref={amtRef} type="number" inputMode="decimal" className="inp" style={{color:C.gold}} placeholder="0.00"/></div>
            </div>
            <div style={{marginBottom:14}}><Lbl ch="Note"/><input ref={noteRef} type="text" className="inp" placeholder="Source, context..."/></div>
            <button onClick={()=>addCash(ctype,lblRef.current&&lblRef.current.value,amtRef.current&&amtRef.current.value,noteRef.current&&noteRef.current.value)} style={{background:C.accentDim,border:"1px solid "+C.accent+"55",color:C.accent,borderRadius:5,padding:"10px 18px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,width:"100%"}}>
              SAVE
            </button>
          </div>
        </div>
      </div>

  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:80}}>
      <LogModal/>
      <FreeModal/>
      <DebtModal/>
      <CashModal/>

      {/* Header */}
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border,padding:"10px 14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>

                              </div>

                                <div>
                                  <div className="lbl">BORROWED</div>

                          </div>

                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            {debts.length>0&&<div className="card" style={{marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center",borderColor:C.accent+"30"}}><span style={{color:C.muted}}>TOTAL (USD)</span><span style={{fontSize:20,fontWeight:700,color:C.red}}>{fmtU(debtTotalUSD)}</span></div>}
          </div>

        {tab==="cash"&&(

                  <div style={{fontSize:10,color:C.muted,marginBottom:4}}>ADDITIONS (added to target)</div>
                  <div style={{fontSize:20,fontWeight:700,color:C.purple}}>{fmtP(cashItems.filter(c=>c.type==="addition").reduce((a,c)=>a+(parseFloat(c.amount)||0),0))}</div>
                  <div style={{fontSize:10,color:C.muted}}>≈ {fmtU(cashAddUSD)}</div>
                  <Bar pct={target>0?(cashAddUSD/target)*100:0} color={C.purple}/>
                </div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:11,color:C.muted}}>{cashItems.length} entries</span>
              <button onClick={()=>setShowAddCash(true)} style={{background:C.accentDim,border:"1px solid "+C.accent+"55",color:C.accent,borderRadius:5,padding:"7px 14px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:11}}>+ ADD ENTRY</button>
            </div>
            {cashItems.length===0&&<div style={{textAlign:"center",padding:60,color:C.muted,fontStyle:"italic"}}>No cash entries yet.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {cashItems.map(c=>{
                const col=c.type==="deployed"?C.gold:C.purple;
                return(
                  <div key={c.id} className="card" style={{display:"flex",alignItems:"center",gap:10,borderLeft:"3px solid "+col,flexWrap:"wrap"}}>
                    <Tag color={col} ch={c.type==="deployed"?"DEPLOYED":"ADDITION"}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600}}>{c.label}</div>
                      {c.note&&<div style={{fontSize:10,color:C.muted,fontStyle:"italic",marginTop:2}}>{c.note}</div>}
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>{c.date}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:700,color:col}}>{fmtP(c.amount)}</div>
                      <div style={{fontSize:10,color:C.muted}}>≈ {fmtU((parseFloat(c.amount)||0)*gbpusd)}</div>
                    </div>
                    <button onClick={()=>setCashItems(prev=>prev.filter(x=>x.id!==c.id))} style={{background:"transparent",border:"1px solid "+C.border,color:C.muted,borderRadius:4,padding:"5px 10px",cursor:"pointer"}}>✕</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* TRADE HISTORY */}
        {tab==="history"&&(
          <div>
            <div className="grid4" style={{marginBottom:12}}>
              {[
                {l:"TOTAL SELLS",v:fmtU(totalSellP),s:fmtT(totalSoldQ)+" tokens",c:C.accent},
                {l:"TOTAL BUYS",v:fmtU(totalBuyC),s:fmtT(totalBoughtQ)+" tokens",c:C.red},
                {l:"NET",v:fmtU(totalSellP-totalBuyC),s:"sells minus buys",c:(totalSellP-totalBuyC)>=0?C.accent:C.red},
                {l:"UNPLANNED",v:String(freeTrades.length),s:freeTrades.filter(t=>t.type==="sell").length+" S · "+freeTrades.filter(t=>t.type==="buy").length+" B",c:C.purple},
              ].map(x=>(
                <div key={x.l} className="card">
                  <div className="lbl">{x.l}</div>
                  <div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:3}}>{x.s}</div>
                </div>
              ))}
            </div>
            {(()=>{
              const levelTrades=levels.flatMap(l=>l.trades.map(t=>({...t,source:"plan",levelLabel:"$"+l.price.toFixed(4)+" level"})));
              const freeT=freeTrades.map(t=>({id:t.id,type:t.type,qty:t.qty,price:t.pricePerToken,totalValue:t.totalValue,date:t.date,note:t.note,source:"free",levelLabel:t.label||"Unplanned"}));
              const all=[...levelTrades,...freeT].sort((a,b)=>b.date.localeCompare(a.date));
              if(all.length===0) return <div style={{textAlign:"center",padding:60,color:C.muted,fontStyle:"italic"}}>No trades logged yet.</div>;
              const byDate={};
              all.forEach(t=>{ if(!byDate[t.date]) byDate[t.date]=[]; byDate[t.date].push(t); });
              return Object.entries(byDate).map(([date,trades])=>(
                <div key={date} style={{marginBottom:14}}>
                  <div style={{fontSize:10,color:C.muted,letterSpacing:2,marginBottom:8,paddingBottom:6,borderBottom:"1px solid "+C.border}}>{date}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {trades.map(t=>{
                      const isSell=t.type==="sell", value=t.totalValue||t.qty*t.price;
                      return(
                        <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:C.card,borderRadius:8,border:"1px solid "+C.border,borderLeft:"3px solid "+(isSell?C.accent:C.red),flexWrap:"wrap"}}>
                          <Tag color={isSell?C.accent:C.red} ch={isSell?"SELL":"BUY"}/>
                          {t.source==="free"&&<Tag color={C.purple} ch="UNPLANNED"/>}
                          <div style={{flex:1,minWidth:100}}>
                            <div style={{fontWeight:600,fontSize:12}}>{t.levelLabel}</div>
                            {t.note&&<div style={{fontSize:10,color:C.muted,fontStyle:"italic",marginTop:2}}>{t.note}</div>}
                          </div>
                          <div style={{display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
                            <div style={{textAlign:"right"}}><div className="lbl">QTY</div><div style={{fontWeight:600,color:C.gold}}>{fmtT(t.qty)}</div></div>
                            <div style={{textAlign:"right"}}><div className="lbl">PRICE</div><div style={{fontWeight:600,color:C.text}}>${t.price.toFixed(6)}</div></div>
                            <div style={{textAlign:"right"}}><div className="lbl">TOTAL</div><div style={{fontWeight:700,fontSize:14,color:isSell?C.accent:C.red}}>{isSell?"+":"-"}{fmtU(value)}</div></div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ));
            })()}
          </div>
        )}
      </div>

      <button className="fab" onClick={()=>setShowFree(true)} title="Log unplanned trade">+</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
